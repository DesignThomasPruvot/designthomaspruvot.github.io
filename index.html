<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Portfolio</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }
    /* Fond d'écran fixe avec Boisbrule.png, centré et étendu en gardant ses proportions */
    body {
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
    }
    /* Conteneur du PDF : 75vw x 100vh sur desktop */
    #pdf-container {
      width: 75vw;
      height: 100vh;
      overflow-y: auto;
    }
    /* Chaque page PDF (canvas) : centrée horizontalement avec marge inférieure de 19px (~5mm) */
    canvas {
      display: block;
      margin: 0 auto 19px auto;
    }
    /* Adaptation pour mobiles/tablettes */
    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
    }
  </style>
  <!-- Inclusion de PDF.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div id="pdf-container"></div>
  <script>
    const url = 'EngPortfolio.pdf'; // Chemin vers la version anglaise du PDF
    const container = document.getElementById('pdf-container');

    function renderPDF() {
      container.innerHTML = ''; // Vider le conteneur pour éviter les doublons
      
      pdfjsLib.getDocument(url).promise.then(pdf => {
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          pdf.getPage(pageNum).then(page => {
            // Récupérer la taille native de la page (scale = 1)
            const initialViewport = page.getViewport({ scale: 1 });
            // Calculer le facteur d'échelle pour que la page rentre dans le conteneur
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const scaleFactor = Math.min(containerWidth / initialViewport.width, containerHeight / initialViewport.height);
            const viewport = page.getViewport({ scale: scaleFactor });
            
            // Pour un rendu net sur mobile, multiplier par le devicePixelRatio
            const dpr = window.devicePixelRatio || 1;
            const canvas = document.createElement('canvas');
            // On définit la résolution du canvas en multipliant par le dpr
            canvas.width = viewport.width * dpr;
            canvas.height = viewport.height * dpr;
            // Et on définit la taille CSS pour qu'il apparaisse à la taille calculée
            canvas.style.width = viewport.width + 'px';
            canvas.style.height = viewport.height + 'px';
            
            const context = canvas.getContext('2d');
            // Appliquer une transformation pour compenser le dpr
            context.setTransform(dpr, 0, 0, dpr, 0, 0);
            
            page.render({
              canvasContext: context,
              viewport: viewport
            });
            container.appendChild(canvas);
          });
        }
      }).catch(error => {
        console.error("Erreur lors du chargement du PDF :", error);
      });
    }

    renderPDF();
    window.addEventListener('resize', renderPDF);
  </script>
</body>
</html>
