<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Portfolio</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow: hidden; /* Empêche le défilement horizontal */
    }
    /* Fond d'écran */
    body {
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
    }
    /* Conteneur du PDF */
    #pdf-container {
      width: 75vw;
      height: 100vh;
      overflow-y: auto;
    }
    /* Style des pages PDF */
    canvas {
      display: block;
      margin: 0 auto 19px auto;
    }
    /* Responsive pour mobiles/tablettes */
    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div id="pdf-container"></div>
  
  <script>
    const url = 'EngPortfolio.pdf'; 
    const container = document.getElementById('pdf-container');

    function renderPDF() {
      container.innerHTML = '';

      pdfjsLib.getDocument(url).promise.then(pdf => {
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          pdf.getPage(pageNum).then(page => {
            const viewport = page.getViewport({ scale: 1 });

            // On conserve le système original de dimensionnement
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const scale = Math.min(containerWidth / viewport.width, containerHeight / viewport.height);
            const scaledViewport = page.getViewport({ scale: scale });

            // Création du canvas
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');

            // Correction pour améliorer la netteté
            const dpr = window.devicePixelRatio || 1;
            canvas.width = scaledViewport.width * dpr;
            canvas.height = scaledViewport.height * dpr;
            canvas.style.width = `${scaledViewport.width}px`;
            canvas.style.height = `${scaledViewport.height}px`;

            context.scale(dpr, dpr);
            context.imageSmoothingEnabled = true;
            context.imageSmoothingQuality = 'high';

            page.render({
              canvasContext: context,
              viewport: scaledViewport
            });

            container.appendChild(canvas);
          });
        }
      }).catch(error => {
        console.error("Erreur lors du chargement du PDF :", error);
      });
    }

    renderPDF();
    window.addEventListener('resize', renderPDF);
  </script>
</body>
</html>
