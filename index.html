<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Portfolio</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
    }

    /* Déclaration des polices */
    @font-face {
      font-family: 'Poppins';
      src: url('fonts/Poppins-Light.woff2') format('woff2'),
           url('fonts/Poppins-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Poppins';
      src: url('fonts/Poppins-Regular.woff2') format('woff2'),
           url('fonts/Poppins-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Exo2';
      src: url('fonts/Exo2-Light.woff2') format('woff2'),
           url('fonts/Exo2-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    /* Application des polices et styles globaux */
    body {
      font-family: 'Poppins', 'Exo2', sans-serif;
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: auto;
      text-shadow: 0 0 1px rgba(0,0,0,0.2);
    }

    /* Conteneur du PDF : 75% de la largeur et 100% de la hauteur sur desktop */
    #pdf-container {
      width: 75vw;
      height: 100vh;
      overflow: auto;
    }

    /* Chaque page PDF (canvas) : centrée horizontalement avec une marge inférieure de 19px (~5mm) */
    canvas {
      display: block;
      margin: 0 auto 19px auto;
    }

    /* Adaptation pour mobiles/tablettes */
    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
      body {
        font-weight: 400;
        text-shadow: 0 0 1px rgba(0,0,0,0.3);
      }
    }
  </style>
  <!-- Inclusion de PDF.js via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div id="pdf-container"></div>
  
  <script>
    const url = 'EngPortfolio.pdf'; // Chemin vers la version anglaise du PDF
    const container = document.getElementById('pdf-container');

    function renderPDF() {
      // Vider le conteneur pour éviter les doublons lors du redimensionnement
      container.innerHTML = '';

      pdfjsLib.getDocument(url).promise.then(pdf => {
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          pdf.getPage(pageNum).then(page => {
            // Forcer l'échelle à 1 (zoom 100% de la taille native)
            const scale = 1;
            const viewport = page.getViewport({ scale: scale });
            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const context = canvas.getContext('2d');

            page.render({
              canvasContext: context,
              viewport: viewport
            });
            container.appendChild(canvas);
          });
        }
      }).catch(error => {
        console.error("Error loading the PDF:", error);
      });
    }

    renderPDF();
    window.addEventListener('resize', renderPDF);
  </script>
</body>
</html>
