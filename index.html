<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio PDF</title>
  <style>
    /* Intégration des polices Poppins et Exo 2 Light */
    @font-face {
      font-family: 'Poppins';
      src: url('Poppins-Light.woff2') format('woff2'),
           url('Poppins-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Poppins';
      src: url('Poppins-Regular.woff2') format('woff2'),
           url('Poppins-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }

    @font-face {
      font-family: 'Exo 2';
      src: url('Exo2-Light.woff2') format('woff2'),
           url('Exo2-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: 'Poppins', sans-serif; /* Appliquer Poppins par défaut */
    }

    body {
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    #pdf-container {
      width: 75vw;
      height: 100vh;
      overflow-y: scroll;  /* Permet le défilement vertical manuel */
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }

    canvas {
      display: block;
      margin: 0 auto 19px auto;
    }

    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div id="pdf-container"></div>
  
  <script>
    const url = 'EngPortfolio.pdf'; 
    const container = document.getElementById('pdf-container');

    function renderPDF() {
      container.innerHTML = '';

      pdfjsLib.getDocument(url).promise.then(pdf => {
        let currentPage = 1;

        function renderPage(pageNum) {
          if (pageNum > pdf.numPages) return;
          
          pdf.getPage(pageNum).then(page => {
            const initialViewport = page.getViewport({ scale: 1 });
            const containerWidth = container.clientWidth;
            const containerHeight = container.clientHeight;
            const scale = Math.min(containerWidth / initialViewport.width, containerHeight / initialViewport.height);
            const viewport = page.getViewport({ scale: scale });

            const canvas = document.createElement('canvas');
            const scaleFactor = window.devicePixelRatio || 1;
            canvas.width = viewport.width * scaleFactor;
            canvas.height = viewport.height * scaleFactor;
            canvas.style.width = `${viewport.width}px`;
            canvas.style.height = `${viewport.height}px`;
            const context = canvas.getContext('2d');
            context.scale(scaleFactor, scaleFactor);

            page.render({
              canvasContext: context,
              viewport: viewport
            }).promise.then(() => {
              container.appendChild(canvas);
            });
          });
        }

        renderPage(currentPage);
        
        // Navigation pour les pages
        container.addEventListener('wheel', function(event) {
          if (event.deltaY > 0 && currentPage < pdf.numPages) {
            currentPage++;
            renderPage(currentPage);
          } else if (event.deltaY < 0 && currentPage > 1) {
            currentPage--;
            renderPage(currentPage);
          }
        });

      }).catch(error => {
        console.error("Erreur lors du chargement du PDF :", error);
      });
    }

    renderPDF();

    window.addEventListener('resize', () => {
      renderPDF();  // Re-rendu uniquement si nécessaire
    });
  </script>
</body>
</html>
