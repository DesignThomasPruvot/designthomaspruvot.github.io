<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio PDF</title>
  
  <style>
    /* Déclaration des polices */
    @font-face {
      font-family: 'Poppins';
      src: url('fonts/Poppins.woff2') format('woff2'),
           url('fonts/Poppins.woff') format('woff');
      font-weight: normal;
      font-style: normal;
    }

    @font-face {
      font-family: 'Poppins Light';
      src: url('fonts/Poppins-Light.woff2') format('woff2'),
           url('fonts/Poppins-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
    }

    @font-face {
      font-family: 'Exo 2 Light';
      src: url('fonts/Exo2-Light.woff2') format('woff2'),
           url('fonts/Exo2-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
    }

    /* Style global */
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      font-family: 'Poppins', sans-serif;
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Conteneur du PDF */
    #pdf-container {
      width: 75vw;
      height: 100vh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Style des pages PDF */
    canvas {
      display: block;
      margin: 0 auto 19px auto;
      image-rendering: -webkit-optimize-contrast;
      image-rendering: crisp-edges;
    }

    /* Adaptation pour mobile */
    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
    }
  </style>

  <!-- Inclusion de PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>

  <div id="pdf-container"></div>

  <script>
    const url = 'EngPortfolio.pdf';
    const container = document.getElementById('pdf-container');
    let pdfDoc = null;

    // Charger le PDF
    pdfjsLib.getDocument(url).promise.then(pdf => {
      pdfDoc = pdf;
      renderPDF(); // Afficher le PDF
      window.addEventListener('resize', debounce(renderPDF, 200)); // Gérer le redimensionnement
    }).catch(error => {
      console.error("Erreur lors du chargement du PDF :", error);
    });

    // Fonction pour calculer l'échelle automatique
    function calculateScale(page) {
      const containerWidth = container.clientWidth;
      const containerHeight = container.clientHeight;
      const viewport = page.getViewport({ scale: 1 });

      return Math.min(containerWidth / viewport.width, containerHeight / viewport.height);
    }

    // Fonction pour rendre le PDF
    function renderPDF() {
      container.innerHTML = '';

      if (!pdfDoc) return;

      for (let i = 1; i <= pdfDoc.numPages; i++) {
        pdfDoc.getPage(i).then(page => {
          const scale = calculateScale(page);
          const viewport = page.getViewport({ scale: scale });

          const canvas = document.createElement('canvas');
          const context = canvas.getContext('2d');

          // Amélioration de la netteté
          const scaleFactor = window.devicePixelRatio || 1;
          canvas.width = viewport.width * scaleFactor;
          canvas.height = viewport.height * scaleFactor;
          canvas.style.width = `${viewport.width}px`;
          canvas.style.height = `${viewport.height}px`;
          context.scale(scaleFactor, scaleFactor);

          page.render({ canvasContext: context, viewport: viewport }).promise.then(() => {
            container.appendChild(canvas);
          });
        });
      }
    }

    // Fonction de debounce pour éviter de trop recalculer au redimensionnement
    function debounce(func, wait) {
      let timeout;
      return function() {
        clearTimeout(timeout);
        timeout = setTimeout(func, wait);
      };
    }
  </script>

</body>
</html>
