<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio PDF</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Désactive le défilement global */
    }

    /* Fond d'écran fixe avec Boisbrule.png, centré et étendu tout en gardant ses proportions */
    body {
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Conteneur du PDF : 75% de la largeur et 100% de la hauteur sur ordinateur */
    #pdf-container {
      width: 75vw;
      height: 100vh;
      overflow: auto; /* Permet le défilement horizontal et vertical */
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Chaque page PDF (canvas) : centré horizontalement avec une marge inférieure de 19px (5mm) */
    canvas {
      display: block;
      margin: 0 auto 19px auto;
      image-rendering: -webkit-optimize-contrast; /* Améliore la netteté sur Chrome */
      image-rendering: crisp-edges; /* Améliore la netteté sur Firefox */
    }

    /* Pour mobiles/tablettes : ajustement à 95% de largeur et 90% de hauteur */
    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
    }

    /* Contrôles de zoom */
    #controls {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255, 255, 255, 0.8);
      padding: 10px;
      border-radius: 5px;
      box-shadow: 0 2px 5px rgba(0, 0, 0, 0.2);
    }

    #controls button {
      margin: 0 5px;
      padding: 5px 10px;
      font-size: 16px;
      cursor: pointer;
    }
  </style>
  <!-- Inclusion de PDF.js depuis le CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div id="pdf-container"></div>
  <div id="controls">
    <button onclick="zoomIn()">Zoom +</button>
    <button onclick="zoomOut()">Zoom -</button>
  </div>

  <script>
    const url = 'EngPortfolio.pdf'; // Chemin vers le PDF
    const container = document.getElementById('pdf-container');
    let currentScale = 1; // Facteur de zoom initial
    let pdfDoc = null;

    // Charger le PDF
    pdfjsLib.getDocument(url).promise.then(pdf => {
      pdfDoc = pdf;
      renderPDF();
    }).catch(error => {
      console.error("Erreur lors du chargement du PDF :", error);
    });

    // Fonction pour rendre le PDF
    function renderPDF() {
      container.innerHTML = ''; // Vider le conteneur

      if (!pdfDoc) return;

      const totalPages = pdfDoc.numPages;
      let currentPage = 1;

      function renderPage() {
        if (currentPage > totalPages) return;

        pdfDoc.getPage(currentPage).then(page => {
          const initialViewport = page.getViewport({ scale: 1 });
          const containerWidth = container.clientWidth;
          const containerHeight = container.clientHeight;

          // Ajuste l'échelle en fonction de l'orientation et du zoom
          let scale;
          if (window.innerWidth > window.innerHeight) {
            // Mode paysage : utilise la largeur du conteneur
            scale = (containerWidth / initialViewport.width) * currentScale;
          } else {
            // Mode portrait : utilise la hauteur du conteneur
            scale = (containerHeight / initialViewport.height) * currentScale;
          }

          const viewport = page.getViewport({ scale: scale });

          const canvas = document.createElement('canvas');
          const scaleFactor = window.devicePixelRatio || 1;
          canvas.width = viewport.width * scaleFactor;
          canvas.height = viewport.height * scaleFactor;
          canvas.style.width = `${viewport.width}px`;
          canvas.style.height = `${viewport.height}px`;
          const context = canvas.getContext('2d');
          context.scale(scaleFactor, scaleFactor);

          page.render({
            canvasContext: context,
            viewport: viewport
          }).promise.then(() => {
            container.appendChild(canvas);
            currentPage++;
            renderPage(); // Rend la page suivante
          });
        });
      }

      renderPage(); // Commence le rendu
    }

    // Gestion du zoom
    function zoomIn() {
      currentScale += 0.1;
      renderPDF(); // Re-rend le PDF avec le nouveau zoom
    }

    function zoomOut() {
      currentScale -= 0.1;
      renderPDF(); // Re-rend le PDF avec le nouveau zoom
    }

    // Débounce pour le redimensionnement
    let resizeTimeout;
    window.addEventListener('resize', () => {
      clearTimeout(resizeTimeout);
      resizeTimeout = setTimeout(renderPDF, 200); // Attend 200ms avant de re-rendre
    });
  </script>
</body>
</html>
