<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio PDF</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Empêche tout défilement global */
    }
    body {
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    #pdf-container {
      width: 75vw;
      height: 100vh;
      overflow-y: auto; /* Permet uniquement le défilement vertical si nécessaire */
    }
    canvas {
      display: block;
      margin: 0 auto 19px auto;
      max-width: 100%;
      height: auto;
    }
    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div id="pdf-container"></div>
  
  <script>
    const url = 'EngPortfolio.pdf';
    const container = document.getElementById('pdf-container');

    function renderPDF() {
      container.innerHTML = ''; // Nettoyer avant d'afficher
      pdfjsLib.getDocument(url).promise.then(pdf => {
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          pdf.getPage(pageNum).then(page => {
            const viewport = page.getViewport({ scale: 1 });
            const scaleFactor = Math.min(container.clientWidth / viewport.width, container.clientHeight / viewport.height) * window.devicePixelRatio;
            const scaledViewport = page.getViewport({ scale: scaleFactor });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            canvas.width = scaledViewport.width;
            canvas.height = scaledViewport.height;
            canvas.style.width = `${scaledViewport.width / window.devicePixelRatio}px`;
            canvas.style.height = `${scaledViewport.height / window.devicePixelRatio}px`;

            page.render({
              canvasContext: context,
              viewport: scaledViewport
            });

            container.appendChild(canvas);
          });
        }
      }).catch(error => {
        console.error("Erreur lors du chargement du PDF :", error);
      });
    }

    renderPDF();
    window.addEventListener('resize', renderPDF);
  </script>
</body>
</html>
