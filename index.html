<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>English Portfolio</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      text-rendering: optimizeLegibility;
      overflow-x: hidden; /* Empêcher le scroll horizontal */
    }
    /* Chargement des polices */
    @font-face {
      font-family: 'Poppins';
      src: url('fonts/Poppins-Light.woff2') format('woff2'),
           url('fonts/Poppins-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Poppins';
      src: url('fonts/Poppins-Regular.woff2') format('woff2'),
           url('fonts/Poppins-Regular.woff') format('woff');
      font-weight: 400;
      font-style: normal;
      font-display: swap;
    }
    @font-face {
      font-family: 'Exo2';
      src: url('fonts/Exo2-Light.woff2') format('woff2'),
           url('fonts/Exo2-Light.woff') format('woff');
      font-weight: 300;
      font-style: normal;
      font-display: swap;
    }

    body {
      font-family: 'Poppins', 'Exo2', sans-serif;
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden; /* Empêche tout défilement inutile */
      text-shadow: 0 0 1px rgba(0,0,0,0.2);
    }

    /* Conteneur du PDF : Largeur dynamique et hauteur fixe */
    #pdf-container {
      width: 80vw; /* Largeur dynamique */
      height: 90vh;
      overflow-y: auto;
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Canvas : largeur adaptable */
    canvas {
      display: block;
      max-width: 100%;
      height: auto;
      margin-bottom: 19px; /* Espacement entre les pages */
    }

    /* Ajustements pour mobiles/tablettes */
    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
      body {
        font-weight: 400;
        text-shadow: 0 0 1px rgba(0,0,0,0.3);
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div id="pdf-container"></div>
  <script>
    const url = 'EngPortfolio.pdf';
    const container = document.getElementById('pdf-container');

    function renderPDF() {
      container.innerHTML = '';

      pdfjsLib.getDocument(url).promise.then(pdf => {
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          pdf.getPage(pageNum).then(page => {
            const viewport = page.getViewport({ scale: 1 });

            // Calcul dynamique de l'échelle en fonction de la largeur de l'écran
            const containerWidth = container.clientWidth;
            const scale = containerWidth / viewport.width;

            // Application du scale + DPI correction
            const dpr = window.devicePixelRatio || 1;
            const scaledViewport = page.getViewport({ scale: scale * dpr });

            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');

            canvas.width = scaledViewport.width;
            canvas.height = scaledViewport.height;
            canvas.style.width = (scaledViewport.width / dpr) + 'px';
            canvas.style.height = (scaledViewport.height / dpr) + 'px';

            context.setTransform(dpr, 0, 0, dpr, 0, 0);
            context.imageSmoothingEnabled = true;
            context.imageSmoothingQuality = 'high';

            page.render({
              canvasContext: context,
              viewport: scaledViewport
            });

            container.appendChild(canvas);
          });
        }
      }).catch(error => {
        console.error("Erreur lors du chargement du PDF :", error);
      });
    }

    renderPDF();
    window.addEventListener('resize', renderPDF);
  </script>
</body>
</html>
