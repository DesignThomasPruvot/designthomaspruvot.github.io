<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio PDF</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden; /* Empêche le défilement latéral */
      display: flex;
      justify-content: center;
      align-items: center;
      background: url('Boisbrule.png') no-repeat center center fixed;
      background-size: cover;
    }

    #pdf-container {
      width: 80vw;
      height: 95vh;
      overflow-y: auto;
    }

    canvas {
      display: block;
      margin: 0 auto 19px auto;
      image-rendering: crisp-edges;
      image-rendering: pixelated;
    }

    @media (max-width: 768px) {
      #pdf-container {
        width: 95vw;
        height: 90vh;
      }
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.10.377/pdf.min.js"></script>
</head>
<body>
  <div id="pdf-container"></div>

  <script>
    const url = 'EngPortfolio.pdf';
    const container = document.getElementById('pdf-container');

    function renderPDF() {
      container.innerHTML = ''; // Nettoyage avant de recharger le PDF
      pdfjsLib.getDocument(url).promise.then(pdf => {
        for (let pageNum = 1; pageNum <= pdf.numPages; pageNum++) {
          pdf.getPage(pageNum).then(page => {
            const initialViewport = page.getViewport({ scale: 1 });
            const scale = Math.min(container.clientWidth / initialViewport.width, container.clientHeight / initialViewport.height);
            const viewport = page.getViewport({ scale: scale });

            const canvas = document.createElement('canvas');
            canvas.width = viewport.width;
            canvas.height = viewport.height;
            const context = canvas.getContext('2d');
            context.imageSmoothingEnabled = false; // Améliore la netteté des caractères

            page.render({ canvasContext: context, viewport: viewport });
            container.appendChild(canvas);
          });
        }
      }).catch(error => console.error("Erreur lors du chargement du PDF :", error));
    }

    renderPDF();
    window.addEventListener('resize', renderPDF);
  </script>
</body>
</html>
